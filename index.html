<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연금 포트폴리오</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- 아이콘 라이브러리 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
:root {
  --bg:       #FAFB8A;
  --sur:      #FFFFFF;
  --sur2:     #F8F9FA;
  --bdr:      #E2E5EA;
  --bdr2:     #CDD1D9;
  --acc:      #2557A7;
  --acc2:     #1A3A6B;
  --gold:     #E08A00;
  --red:      #C0392B;
  --green:    #1B6B3A;
  --muted:    #7A8699;
  --text:     #1A1F2E;
  --text2:    #4A5568;
  --fd:       'Syne', sans-serif;
  --fb:       'Noto Sans KR', sans-serif;
  --fm:       'JetBrains Mono', monospace;
  --r:        10px;
  --tr:       all .18s ease;
  --shadow:   0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;min-height:100vh;overflow-x:hidden}
.app{max-width:1280px;margin:0 auto;padding:0 clamp(12px,3vw,32px) 60px}

/* ── Header ── */
.header {
  padding: 16px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.header-left h1 {
  font-family: var(--fd);
  font-size: 34px !important; 
  font-weight: 900 !important; 
  letter-spacing: -1px;
  color: var(--acc2);
  white-space: nowrap;
}
.header-left p { display: none; }

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* 구글 시트 버튼 전용 스타일 */
.btn-sheet {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: var(--r);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--tr);
  background: #fff;
  border: 1px solid #1D854E;
  color: #1D854E;
}
.btn-sheet:hover {
  background: #f0fff4;
}

/* 기존 버튼 스타일 */
.btn-outline-header {
  padding: 7px 16px;
  border-radius: var(--r);
  font-family: var(--fb);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--tr);
  background: var(--acc2);
  color: #fff;
  border: none;
}
.btn-outline-header:hover { background: var(--acc); }

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:18px 20px;
  position:relative;overflow:hidden;transition:var(--tr);min-width:0;box-shadow:var(--shadow)}
.kpi-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.kpi-label{font-size:11px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-family:var(--fm);font-size:clamp(15px,2vw,21px);font-weight:500;color:var(--text);word-break:break-all}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px}
.kpi-badge{position:absolute;top:14px;right:14px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-up{background:#D4EDDA;color:var(--green)}
.badge-down{background:#FDECEA;color:var(--red)}
.badge-neu{background:#E3EBF8;color:var(--acc)}

/* ── Filter & Tabs ── */
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--bdr2);
  font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;
  background:transparent;color:var(--muted);transition:var(--tr);white-space:nowrap}
.filter-btn.active{color:#fff;background:var(--acc);border-color:transparent}

.tabs{display:flex;gap:0;border-bottom:2px solid var(--bdr);margin-bottom:20px}
.tab{padding:9px 18px;border:none;cursor:pointer;font-family:var(--fb);font-size:13px;color:var(--muted);background:transparent;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:700}
.panel{display:none}
.panel.active{display:block}

/* ── Table & Cards ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;min-width:680px;background:var(--sur)}
thead tr{background:var(--acc2)}
thead th{padding:10px 14px;text-align:right;font-size:11px;color:#fff}
tbody td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--bdr);text-align:right}
.num{font-family:var(--fm)}
.pos{color:var(--green)}.neg{color:var(--red)}

/* ── Modal & Toast ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.35);backdrop-filter:blur(2px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--sur);border-radius:14px;padding:24px;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--sur2);border:1px solid var(--bdr2);border-radius:10px;padding:12px 18px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.4);transform:translateY(70px);opacity:0;transition:all .25s ease;display:flex;align-items:center;gap:8px}
.toast.show{transform:none;opacity:1}

/* ── Responsive ── */
@media(max-width:768px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .header{flex-direction:column;align-items:flex-start}
  .header-right{width:100%;justify-content:flex-end;margin-top:10px}
}
</style>
</head>
<body>

<div class="app">
  <!-- Header 수정: 버튼 뭉치에 구글 시트 버튼 포함 -->
  <header class="header">
    <div class="header-left">
      <h1>연금 포트폴리오</h1>
      <p id="lastUpdated">—</p>
    </div>
    <div class="header-right">
      <button onclick="updateSheet()" class="btn-sheet" title="구글 시트로 전송">
        <i class="fa-solid fa-file-csv"></i> <span>업데이트</span>
      </button>
      <button class="btn btn-outline-header" onclick="openModal()">＋ 거래 추가</button>
      <button class="btn btn-outline-header" onclick="openTxPopup()">📋 거래내역</button>
    </div>
  </header>

  <!-- KPI 영역 -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">총 투자 원금</div>
      <div class="kpi-value" id="kpi-p">₩0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">총 평가 금액</div>
      <div class="kpi-value" id="kpi-e">₩0</div>
      <span class="kpi-badge badge-neu" id="kpi-eb">—</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">총 손익</div>
      <div class="kpi-value" id="kpi-pnl">₩0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">전체 수익률</div>
      <div class="kpi-value" id="kpi-r">0.00%</div>
    </div>
  </div>

  <!-- 탭 & 필터 (생략 방지를 위해 뼈대 유지) -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('All')">전체</button>
    <button class="filter-btn" onclick="setFilter('IRP')">IRP</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')">📊 대시보드</button>
    <button class="tab" onclick="switchTab('holdings')">💼 보유현황</button>
  </div>

  <div id="tab-dashboard" class="panel active">
    <div class="empty">데이터를 입력하거나 업데이트 해주세요.</div>
  </div>
</div>

<!-- 모달 & 토스트 레이아웃 (생략) -->
<div class="toast" id="toast"><div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div><span id="toast-msg"></span></div>

<script>
// 데이터 저장 및 로드 기본 로직
let D = { transactions:[], currentPrices:{}, lastUpdated:null };
const SK = 'pension_v1';

function save() {
  D.lastUpdated = new Date().toISOString();
  localStorage.setItem(SK, JSON.stringify(D));
}

// 구글 시트 업데이트 함수
async function updateSheet() {
  if (!confirm("현재 데이터를 구글 스프레드시트로 업데이트할까요?")) return;

  const scriptUrl = 'https://script.google.com/macros/s/AKfycbxVcYam5rbW3cBYVcmYnADSjuXuIW2ZTPdYRGU_3kBo1PQgaqjCa8k5yDo9lbsg81DLcA/exec';
  const data = {
    date: new Date().toLocaleString(),
    summary: {
      total_p: document.getElementById('kpi-p').innerText,
      total_e: document.getElementById('kpi-e').innerText
    }
  };

  try {
    await fetch(scriptUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    alert('✅ 스프레드시트에 성공적으로 기록되었습니다!');
  } catch (error) {
    alert('❌ 저장 실패! 설정을 확인해 주세요.');
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 탭 전환 등 기본 UI 함수
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
}
</script>

</body>
</html>
